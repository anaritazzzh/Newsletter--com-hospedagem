<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <header class="topo">
        <div class="container">
            <strong>Newsletter</strong>
            <button id="btnTema" class="btn">Alternar tema 🌗</button>
        </div>
    </header>

    <main class="container">
        <section class="caixa">
            <h1>Inscreva-se</h1>
            <p>Receba novidades no seu email. Sem spam.</p>

            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

                <label for="email">Digite seu email:</label>
                <input type="email" name=email id="email" placeholder="Digite seu Email">
                <button type="submit" class="btn primario">Quero receber</button>
                <label for="lalala">Lerolero</label>
                <input type="submit" name="lalala" id="lalala">
            </form>
        </section>
    </main>

    <footer class="rodapé">
        <div class="container">
            <small>Newsletter <span id="ano"></span></small>
        </div>
    </footer>
</body>

</html>
